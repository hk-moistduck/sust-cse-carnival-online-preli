version: "3.9"

services:
  investigator:
    build: .
    container_name: supportops-investigator
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - LARGE_AMOUNT_THRESHOLD=100000
      - CRITICAL_AMOUNT_THRESHOLD=500000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3